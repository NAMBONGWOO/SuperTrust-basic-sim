<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00938a">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperTrust Basic Sim - 테너남</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --tether-mint: #00938a; --tether-navy: #1a2a40; --tether-gray: #5e6c7c; --bg: #f4f7f9; --boost: #ff9800; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); padding: 8px; color: var(--tether-navy); -webkit-text-size-adjust: none; }
        .card { background: white; padding: 12px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 950px; margin: auto; box-sizing: border-box; }
        h2 { margin: 0 0 5px 0; font-weight: 800; font-size: 1.1rem; text-align: center; color: var(--tether-mint); }
        .ver-tag { text-align: center; font-size: 9px; color: #adb5bd; margin-bottom: 10px; font-weight: bold; }
        
        .input-group { background: #f8f9fa; padding: 10px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #eee; }
        .section-title { font-size: 10px; font-weight: bold; color: var(--tether-mint); margin-bottom: 8px; border-left: 3px solid var(--tether-mint); padding-left: 6px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-item label { font-size: 0.65rem; font-weight: 700; color: var(--tether-gray); margin-bottom: 3px; display: block; }
        .input-item input, .input-item select { padding: 5px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.8rem; text-align: right; font-weight: 800; color: var(--tether-mint); outline: none; width: 100%; box-sizing: border-box; }

        /* 테이블 너비 자동 맞춤 핵심 설정 */
        .table-container { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; -webkit-overflow-scrolling: touch; }
        table { width: auto; min-width: 100%; border-collapse: collapse; font-size: 0.65rem; text-align: center; white-space: nowrap; table-layout: auto; }
        thead th { background: #000000 !important; color: #ffffff !important; padding: 8px 4px; font-weight: 600; letter-spacing: -0.3px; }
        td { padding: 6px 4px; border-bottom: 1px solid #eee; }
        
        /* 주차 열 고정 및 너비 최소화 */
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 2; padding: 0 6px; border-right: 1px solid #eee; width: 1%; }
        th:first-child { background: #000000; }
        td:first-child { background: #fcfcfc; font-weight: 700; }

        /* 추가투입 열 타이트하게 */
        .col-extra { width: 1%; padding: 6px 2px; } 
        
        /* 스테퍼 컴팩트화 */
        .row-stepper { display: inline-flex; align-items: center; background: white; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
        .row-stepper button { width: 20px; height: 20px; border: none; background: #f8f9fa; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--boost); flex-shrink: 0; }
        .row-stepper input { 
            width: 32px; border: none; text-align: center; font-size: 0.68rem; font-weight: 800; 
            background: transparent; outline: none; padding: 0; color: var(--boost);
        }
        .row-stepper input::-webkit-outer-spin-button,
        .row-stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .bg-blue { background-color: #f1f8ff; font-weight: 800; color: #0056b3; }
        .bg-gray { background-color: #f8f9fa; color: #6c757d; font-size: 0.6rem; }
        .bg-increase { background-color: #fff2f0; color: #cf1322; font-weight: 800; }
        .member-on { color: #1a73e8; font-weight: bold; }
        .member-off { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>SuperTrust Basic Sim</h2>
    <div class="ver-tag">AUTO-FIT LAYOUT v1.24</div>
    <div class="input-group">
        <div class="section-title">ASSET CONFIG</div>
        <div class="input-grid">
            <div class="input-item"><label>신용대금 (USDT)</label><input type="text" id="currentCredit" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatInput(this); runSim()"></div>
            <div class="input-item"><label>일일지급금 (USDT)</label><input type="text" id="dailyPay" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatInput(this); runSim()"></div>
            <div class="input-item"><label>SUT 시세 ($)</label><input type="text" id="sutMarketPrice" value="1.0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatInput(this); runSim()"></div>
            <div class="input-item"><label>신용매수가 ($)</label><input type="text" id="creditPrice" value="4.8" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatInput(this); runSim()"></div>
            <div class="input-item"><label>주정산 요일</label>
                <select id="payDay" onchange="runSim()">
                    <option value="1">월요일</option><option value="2">화요일</option>
                    <option value="3">수요일</option><option value="4">목요일</option>
                    <option value="5">금요일</option>
                </select>
            </div>
            <div class="input-item"><label>기간 (주)</label><input type="number" id="weeks" value="12" oninput="runSim()"></div>
        </div>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>주차</th><th>날짜</th><th>가용금액</th><th class="bg-blue col-extra">추가투입</th><th>주정산금</th><th>자격</th><th class="bg-blue">재참여</th><th class="bg-increase">일일지급금</th><th>합계(K)</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
</div>
<script>
let weeklyExtras = new Array(53).fill(0);
function formatInput(el) { let val = el.value.replace(/[^0-9.]/g, ''); if (val !== "") { let parts = val.split('.'); parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ","); el.value = parts.join('.'); } }
function updateWeeklyExtra(week, delta) { weeklyExtras[week] = Math.max(0, weeklyExtras[week] + delta); runSim(); }
function handleDirectInput(week, val) { weeklyExtras[week] = parseFloat(val) || 0; runSim(); }

function runSim() {
    const parseNum = (id) => parseFloat(document.getElementById(id).value.replace(/,/g, '')) || 0;
    let creditTotal = parseNum('currentCredit'), dailyPay = parseNum('dailyPay');
    const creditPrice = parseNum('creditPrice'), marketPrice = parseNum('sutMarketPrice'), payDayIdx = parseInt(document.getElementById('payDay').value), weeksCount = parseInt(document.getElementById('weeks').value) || 12;
    const dailyRate = creditTotal > 0 ? dailyPay / creditTotal : 0;
    const tbody = document.getElementById('resultBody'); tbody.innerHTML = '';
    let simulationDate = new Date("2026-03-17"), carryOver = 0;
    
    for (let w = 1; w <= weeksCount; w++) {
        let settlementDate = new Date(simulationDate); settlementDate.setDate(simulationDate.getDate() + (w-1)*7 + (payDayIdx - settlementDate.getDay() + 7) % 7);
        let weeklySettlement = dailyPay * 7, extra = weeklyExtras[w], availableTotal = weeklySettlement + carryOver + extra;
        let memberThreshold = weeklySettlement * 0.5, baseReinvest = Math.floor(availableTotal / 100) * 100;
        let neededSut = baseReinvest * 0.25, totalCost = baseReinvest + (neededSut * marketPrice);
        while (totalCost > availableTotal && baseReinvest >= 100) { baseReinvest -= 100; neededSut = baseReinvest * 0.25; totalCost = baseReinvest + (neededSut * marketPrice); }
        let isMemberOn = baseReinvest >= (memberThreshold - 0.1);

        tbody.innerHTML += `<tr>
            <td>${w}</td>
            <td>${settlementDate.getMonth()+1}/${settlementDate.getDate()}</td>
            <td class="bg-gray">${f(availableTotal)}</td>
            <td class="col-extra"><div class="row-stepper"><button onclick="updateWeeklyExtra(${w},-50)">-</button>
                <input type="number" value="${extra}" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="handleDirectInput(${w}, this.value)">
                <button onclick="updateWeeklyExtra(${w},50)">+</button></div></td>
            <td style="font-weight:bold;">${f(weeklySettlement)}</td>
            <td>${isMemberOn ? '<span class="member-on">ON</span>':'<span class="member-off">OFF</span>'}</td>
            <td class="bg-blue">${f(baseReinvest)}</td>
            <td class="bg-increase">${dailyPay.toFixed(1)}</td>
            <td style="font-weight:bold;">${(creditTotal/1000).toFixed(1)}K</td>
        </tr>`;
        
        creditTotal += baseReinvest + (neededSut * creditPrice); dailyPay = creditTotal * dailyRate; carryOver = availableTotal - totalCost;
    }
}
function f(n) { return Math.round(n).toLocaleString(); }
window.onload = runSim;
</script>
</body>
</html>
